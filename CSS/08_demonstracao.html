<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstração do Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./08_demonstracao.css" </head>

<body>

    <div class="container-fluid">
        
        <div class="row"> <!-- Row = Linha -->
            <!-- Menu lateral -->
            <div class="col-2 menuLateral"> <!-- Col = Coluna -->
                <div class="text-center mt-2">
                    <img class="mt-3 rounded-circle" src="https://placehold.co/75" />
                    <h1 class="fs-5 text">Lz System</h1>

                </div>

                <div class="list-group list-group-flush my-5">
                    <a href="#" class="list-group-item list-group-item-action">Início</a>
                    <a href="#" class="list-group-item list-group-item-action">Usúarios</a>
                    <a href="#" class="list-group-item list-group-item-action">Produtos</a>
                </div>

                <div class="text-center manuLateralPerfil">

                    <img class="rounded-circle" src="https://placehold.co/40" />

                    <div class="btn-group dropend" role="group">
                        <button type="button" class="btn dropdown-toggle" data-bs-toggle="dropdown">
                            Perfil
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Editar</a></li>
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </div>
                </div>

            </div>

            <!-- Conteúdo Pricipal -->
            <div class="col-10 mt-4">

                <!-- Introdução -->
                <div>
                    <h2>Gerenciamento de usúario</h2>
                    <hr />
                </div>

                <!-- Pesquisa e Filtro -->
                <div class="row">
                    <div class="col-8">
                        <div class="input-group mb-3">
                            <input class="form-control" placeholder="Pesquisar">
                            <button class="btn btn-outline-secondary">🔎</button>
                        </div>
                    </div>

                    <div class="col-4">
                        <select class="form-select">
                            <option selected disabled hidden>FIltros</option>
                            <option value="1">One</option>
                            <option value="2">Two</option>
                            <option value="3">Three</option>
                        </select>
                    </div>
                </div>

                <!-- Cadastro -->
                <div class="text-end my-3">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">Novo</button>
                </div>

                <!-- Tabela de Listagem -->
                <div>

                    <!-- ID,foto,nome -->
                    <div class="my-3">
                        <table class="table table-dark table-hover table-bordered">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">ID</th>
                                    <th scope="col">NOMES</th>
                                    <th scope="col">FOTOS</th>
                                </tr>
                            </thead>
                            <tbody class="table-group-divider">
                                <tr>
                                    <th scope="row">1</th>
                                    <td>Mark</td>
                                    <td>Otto</td>
                                    <td> <img class="rounded-circle" src="https://placehold.co/40" /> Luan</td>
                                </tr>
                                <tr>
                                    <th scope="row">2</th>
                                    <td>Jacob</td>
                                    <td>Thornton</td>
                                    <td> <img class="rounded-circle" src="https://placehold.co/40" /> Lua</td>
                                </tr>
                                <tr>
                                    <th scope="row">3</th>
                                    <td>John</td>
                                    <td>Doe</td>
                                    <td> <img class="rounded-circle" src="https://placehold.co/40" /> Ruan</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>


        <!-- Modals -->
        <div>
            <div class="modal fade" id="exampleModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 class="modal-title fs-5">Cadastro de novo usúario</h3>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label w-100">
                                    Digite seu nome:
                                    <input class="form-control" />
                                </label>
                            </div>

                            <div>
                                <label class="form-label w-100">
                                    Digite sua senha:
                                    <input type="password" class="form-control" />
                                </label>
                            </div>



                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button class="btn btn-primary">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
